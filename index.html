<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>te notebook</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-hover: #222222;
    --border: #2a2a2a;
    --text-primary: #e8e4df;
    --text-secondary: #8a8580;
    --text-muted: #5a5550;
    --accent-tristen: #c4956a;
    --accent-evan: #6a8fa4;
    --accent-tristen-dim: rgba(196, 149, 106, 0.12);
    --accent-evan-dim: rgba(106, 143, 164, 0.12);
    --overlay-bg: rgba(0,0,0,0.6);
    --fab-shadow: rgba(196, 149, 106, 0.3);
    --error: #c46a6a;
  }

  [data-theme="light"] {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface-hover: #f0eeeb;
    --border: #e4e0db;
    --text-primary: #2a2520;
    --text-secondary: #7a756f;
    --text-muted: #a8a29e;
    --accent-tristen: #b07d4f;
    --accent-evan: #4e7a91;
    --accent-tristen-dim: rgba(176, 125, 79, 0.1);
    --accent-evan-dim: rgba(78, 122, 145, 0.1);
    --overlay-bg: rgba(0,0,0,0.3);
    --fab-shadow: rgba(176, 125, 79, 0.25);
    --error: #a04040;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s, color 0.3s;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ===== LOGIN PAGE ===== */
  .login-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 20px;
  }

  .login-box {
    width: 100%;
    max-width: 340px;
  }

  .login-title {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--text-primary);
    text-align: center;
    margin-bottom: 6px;
  }

  .login-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-align: center;
    margin-bottom: 40px;
  }

  .login-field {
    margin-bottom: 16px;
  }

  .login-label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
    margin-bottom: 6px;
  }

  .login-input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, background 0.3s, color 0.3s;
  }

  .login-input:focus { border-color: var(--text-secondary); }
  .login-input::placeholder { color: var(--text-muted); }

  .login-btn {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    background: var(--accent-tristen);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, background 0.3s;
    letter-spacing: 0.03em;
  }

  [data-theme="dark"] .login-btn { color: var(--bg); }
  .login-btn:disabled { opacity: 0.3; cursor: default; }
  .login-btn:not(:disabled):active { opacity: 0.8; }

  .login-error {
    margin-top: 14px;
    font-size: 12px;
    color: var(--error);
    text-align: center;
    min-height: 18px;
  }

  .login-theme-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    transition: color 0.2s;
    line-height: 1;
  }

  /* ===== APP (notebook) ===== */
  .app-page { display: none; }

  /* header */
  header {
    padding: 48px 0 32px;
    text-align: center;
    position: relative;
  }

  header h1 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  header p {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* header buttons row */
  .header-actions {
    position: absolute;
    top: 48px;
    right: 0;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .header-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    transition: color 0.2s;
    line-height: 1;
  }

  .header-btn:active { color: var(--text-primary); }

  .logout-btn {
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .logout-btn:active {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  /* tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    transition: border-color 0.3s;
  }

  .tab {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
    position: relative;
    letter-spacing: 0.03em;
  }

  .tab.active { color: var(--text-primary); }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 20%;
    width: 60%;
    height: 1px;
    background: var(--text-secondary);
  }

  /* sector filter */
  .sector-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .sector-bar::-webkit-scrollbar { display: none; }

  .sector-tag {
    padding: 5px 14px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .sector-tag.active {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  /* notes list */
  .notes-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-bottom: 120px;
  }

  .note-card {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    transition: border-color 0.3s;
  }

  .note-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .note-author {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .note-author.tristen { color: var(--accent-tristen); }
  .note-author.evan { color: var(--accent-evan); }

  .note-sector {
    font-size: 11px;
    color: var(--text-muted);
    padding: 1px 8px;
    background: var(--surface);
    border-radius: 10px;
    transition: background 0.3s;
  }

  .note-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .note-content {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* notes count */
  .notes-count {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
    padding: 5px 0;
    flex-shrink: 0;
  }

  /* calendar toggle */
  .calendar-toggle-row {
    display: flex;
    margin-bottom: 16px;
  }

  .calendar-toggle-btn {
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .calendar-toggle-btn:active {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  .calendar-toggle-btn.open {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  /* calendar */
  .calendar-wrapper {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, margin 0.35s ease, opacity 0.25s ease;
    margin-bottom: 0;
    opacity: 0;
  }

  .calendar-wrapper.open {
    max-height: 320px;
    margin-bottom: 20px;
    opacity: 1;
  }

  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 10px;
  }

  .cal-nav-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
    transition: color 0.2s;
    line-height: 1;
  }

  .cal-nav-btn:active { color: var(--text-primary); }

  .cal-month-label {
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 500;
    letter-spacing: 0.03em;
    min-width: 100px;
    text-align: center;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-head {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.04em;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text-muted);
    border-radius: 8px;
    position: relative;
    cursor: default;
    transition: background 0.15s;
  }

  .cal-day.empty { visibility: hidden; }

  .cal-day.has-notes {
    color: var(--text-primary);
    cursor: pointer;
  }

  .cal-day.has-notes:active {
    background: var(--accent-tristen-dim);
  }

  .cal-day.has-notes::after {
    content: '';
    position: absolute;
    bottom: 3px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent-tristen);
  }

  .cal-day.has-both::after {
    width: 10px;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent-tristen) 50%, var(--accent-evan) 50%);
  }

  .cal-day.today {
    background: var(--surface-hover);
    font-weight: 500;
  }

  /* date separator in notes list */
  .date-separator {
    padding: 20px 0 8px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
    transition: border-color 0.3s;
  }

  .date-separator:first-child { padding-top: 0; }

  /* edit button */
  .note-edit-btn {
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 4px;
    letter-spacing: 0.02em;
  }

  .note-edit-btn:active {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  /* inline edit mode */
  .note-edit-area {
    width: 100%;
    min-height: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-primary);
    resize: none;
    outline: none;
    transition: border-color 0.2s, background 0.3s, color 0.3s;
  }

  .note-edit-area:focus { border-color: var(--text-secondary); }

  .note-edit-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    justify-content: flex-end;
  }

  .note-edit-save, .note-edit-cancel {
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .note-edit-save {
    background: var(--accent-tristen);
    color: #fff;
    border-color: var(--accent-tristen);
  }

  [data-theme="dark"] .note-edit-save { color: var(--bg); }

  .note-edit-cancel {
    background: none;
    color: var(--text-muted);
  }

  .note-edit-cancel:active {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  /* compose area */
  .compose-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 10;
    backdrop-filter: blur(4px);
  }

  .compose-overlay.open { display: block; }

  .compose-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    z-index: 11;
    transform: translateY(100%);
    transition: transform 0.3s ease, background 0.3s, border-color 0.3s;
  }

  .compose-panel.open { transform: translateY(0); }

  .compose-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .compose-header span {
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
  }

  .compose-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .compose-sector-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }

  .compose-sector-btn {
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .compose-sector-btn.active {
    color: var(--accent-tristen);
    border-color: var(--accent-tristen);
    background: var(--accent-tristen-dim);
  }

  .compose-textarea {
    width: 100%;
    min-height: 120px;
    max-height: 240px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-primary);
    resize: none;
    outline: none;
    transition: border-color 0.2s, background 0.3s, color 0.3s;
  }

  .compose-textarea:focus { border-color: var(--text-secondary); }
  .compose-textarea::placeholder { color: var(--text-muted); }

  .compose-send {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    background: var(--accent-tristen);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, background 0.3s;
    letter-spacing: 0.03em;
  }

  [data-theme="dark"] .compose-send { color: var(--bg); }

  .compose-send:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .compose-send:not(:disabled):active { opacity: 0.8; }

  /* fab */
  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    right: 24px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent-tristen);
    color: #fff;
    border: none;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--fab-shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    transition: transform 0.2s, background 0.3s;
  }

  .fab:active { transform: scale(0.92); }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.8;
  }

  /* loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* toast */
  .toast {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 20;
    transition: transform 0.3s ease, background 0.3s, border-color 0.3s, color 0.3s;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div class="login-page" id="loginPage">
  <button class="login-theme-toggle" id="loginThemeToggle" title="切换主题">☽</button>
  <div class="login-box">
    <div class="login-title">te notebook</div>
    <div class="login-subtitle">属于我们的地方</div>
    <div class="login-field">
      <label class="login-label">邮箱</label>
      <input class="login-input" type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label class="login-label">密码</label>
      <input class="login-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">进入</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== APP PAGE ===== -->
<div class="app-page" id="appPage">
  <div class="container">
    <header>
      <h1>te notebook</h1>
      <p>属于我们的地方</p>
      <div class="header-actions">
        <button class="logout-btn" id="logoutBtn">登出</button>
        <button class="header-btn" id="themeToggle" title="切换主题">☽</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-filter="all">全部</button>
      <button class="tab" data-filter="tristen">Tristen</button>
      <button class="tab" data-filter="evan">Evan</button>
    </div>

    <div class="sector-bar">
      <button class="sector-tag active" data-sector="all">所有</button>
      <button class="sector-tag" data-sector="memo">碎语</button>
      <button class="sector-tag" data-sector="letter">留言</button>
      <button class="sector-tag" data-sector="diary">日记</button>
      <button class="sector-tag" data-sector="intimate">亲密</button>
      <span class="notes-count" id="notesCount"></span>
    </div>

    <div class="calendar-toggle-row">
      <button class="calendar-toggle-btn" id="calendarToggle">🗓 月历</button>
    </div>

    <div class="calendar-wrapper" id="calendarWrapper">
      <div class="calendar-nav">
        <button class="cal-nav-btn" id="calPrev">‹</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button class="cal-nav-btn" id="calNext">›</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="notes-list" id="notesList">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <button class="fab" id="fabBtn">✦</button>

  <div class="compose-overlay" id="overlay"></div>
  <div class="compose-panel" id="composePanel">
    <div class="compose-header">
      <span>写点什么</span>
      <button class="compose-close" id="closeBtn">✕</button>
    </div>
    <div class="compose-sector-row" id="composeSectors">
      <button class="compose-sector-btn active" data-sector="memo">碎语</button>
      <button class="compose-sector-btn" data-sector="letter">留言</button>
      <button class="compose-sector-btn" data-sector="diary">日记</button>
      <button class="compose-sector-btn" data-sector="intimate">亲密</button>
    </div>
    <textarea class="compose-textarea" id="composeText" placeholder="写给你，或者写给我们…"></textarea>
    <button class="compose-send" id="sendBtn" disabled>落笔</button>
  </div>
</div>

<div class="toast" id="toast"></div>

  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xeWRzbW1rdHFsaXR2Z2Zkc3p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTkyNzgsImV4cCI6MjA5NzYzNTI3OH0.-cHviY0gjtZfyDbRTIZwITpbDfwL1wQiIS-t-xZ5AN4';

  // ---- SUPABASE CLIENT ----
  const { createClient } = window.supabase || {};
  if (!createClient) {
    document.getElementById('loginError').textContent = 'SDK 加载失败，刷新试试';
    throw new Error('supabase SDK not loaded');
  }
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ---- THEME ----
  let currentTheme = localStorage.getItem('te-theme') || 'dark';
  applyTheme(currentTheme);

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('#themeToggle, #loginThemeToggle').forEach(btn => {
      btn.textContent = theme === 'dark' ? '☽' : '☀';
    });
    currentTheme = theme;
    localStorage.setItem('te-theme', theme);
  }

  document.getElementById('loginThemeToggle').addEventListener('click', () => {
    applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
  });

  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
  });

  // ---- AUTH STATE ----
  let currentUser = null;
  let currentAuthor = null;

  async function checkSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      await resolveAuthor();
      showApp();
    } else {
      showLogin();
    }
  }

  async function resolveAuthor() {
    const { data } = await sb
      .from('user_profiles')
      .select('author_name')
      .eq('id', currentUser.id)
      .single();
    if (data) {
      currentAuthor = data.author_name;
    } else {
      const name = (currentUser.user_metadata?.display_name || '').toLowerCase();
      currentAuthor = name === 'tristen' ? 'tristen' : 'evan';
    }
  }

  function showLogin() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('appPage').style.display = 'none';
  }

  function showApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display = 'block';
    loadNotes();
  }

  // ---- LOGIN ----
  const loginBtn = document.getElementById('loginBtn');
  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const loginError = document.getElementById('loginError');

  loginBtn.addEventListener('click', doLogin);
  loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  loginEmail.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginPassword.focus(); });

  async function doLogin() {
    const email = loginEmail.value.trim();
    const password = loginPassword.value;
    if (!email || !password) { loginError.textContent = '填完再说'; return; }
    loginBtn.disabled = true;
    loginBtn.textContent = '…';
    loginError.textContent = '';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      loginError.textContent = '邮箱或密码不对';
      loginBtn.disabled = false;
      loginBtn.textContent = '进入';
      return;
    }
    currentUser = data.user;
    await resolveAuthor();
    loginBtn.textContent = '进入';
    loginBtn.disabled = false;
    showApp();
  }

  // ---- LOGOUT ----
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    currentUser = null;
    currentAuthor = null;
    showLogin();
    showToast('已登出');
  });

  // ---- STATE ----
  let allNotes = [];
  let filterAuthor = 'all';
  let filterSector = 'all';
  const EDIT_WINDOW_MS = 10 * 60 * 1000; // 10 minutes

  // ---- LOAD ----
  async function loadNotes() {
    const list = document.getElementById('notesList');
    list.innerHTML = '<div class="loading">加载中…</div>';
    try {
      const { data, error } = await sb
        .from('notes')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      allNotes = data;
      renderNotes();
    } catch (e) {
      list.innerHTML = `<div class="empty-state">加载失败：${e.message}</div>`;
    }
  }

  // ---- RENDER ----
  function renderNotes() {
    const list = document.getElementById('notesList');
    let filtered = allNotes;
    if (filterAuthor !== 'all') filtered = filtered.filter(n => n.author === filterAuthor);
    if (filterSector !== 'all') filtered = filtered.filter(n => n.sector === filterSector);

    // update count
    document.getElementById('notesCount').textContent = `${filtered.length} 则`;

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">还没有内容<br>写第一条吧</div>';
      return;
    }

    const now = Date.now();
    const sectorMap = { memo: '碎语', letter: '留言', diary: '日记', intimate: '亲密' };
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    let lastDateKey = '';
    let html = '';

    for (const n of filtered) {
      const d = new Date(n.created_at);
      const dateKey = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      const timeStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;

      // date separator
      if (dateKey !== lastDateKey) {
        const dateLabel = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · 周${weekdays[d.getDay()]}`;
        html += `<div class="date-separator" id="date-${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}">${dateLabel}</div>`;
        lastDateKey = dateKey;
      }

      // edit button: only show for own notes within 10 min
      const canEdit = n.author === currentAuthor && (now - d.getTime()) < EDIT_WINDOW_MS;
      const editBtnHtml = canEdit ? `<button class="note-edit-btn" data-id="${n.id}" onclick="startEdit(this)">改</button>` : '';

      html += `
        <div class="note-card" data-note-id="${n.id}">
          <div class="note-meta">
            <span class="note-author ${n.author}">${n.author === 'tristen' ? 'Tristen' : 'Evan'}</span>
            <span class="note-sector">${sectorMap[n.sector] || n.sector}</span>
            <span class="note-time">${editBtnHtml}${timeStr}</span>
          </div>
          <div class="note-content">${escHtml(n.content)}</div>
        </div>
      `;
    }

    list.innerHTML = html;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- INLINE EDIT ----
  function startEdit(btn) {
    const noteId = btn.dataset.id;
    const card = btn.closest('.note-card');
    const contentEl = card.querySelector('.note-content');
    const original = allNotes.find(n => n.id === noteId);
    if (!original) return;

    contentEl.innerHTML = `
      <textarea class="note-edit-area">${escHtml(original.content)}</textarea>
      <div class="note-edit-actions">
        <button class="note-edit-cancel" onclick="cancelEdit('${noteId}')">算了</button>
        <button class="note-edit-save" onclick="saveEdit('${noteId}')">改好了</button>
      </div>
    `;
    const ta = contentEl.querySelector('.note-edit-area');
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);

    // hide edit button while editing
    btn.style.display = 'none';
  }

  function cancelEdit(noteId) {
    const original = allNotes.find(n => n.id === noteId);
    if (!original) return;
    const card = document.querySelector(`[data-note-id="${noteId}"]`);
    const contentEl = card.querySelector('.note-content');
    contentEl.innerHTML = escHtml(original.content);

    // restore edit button if still within window
    const btn = card.querySelector('.note-edit-btn');
    if (btn) btn.style.display = '';
  }

  async function saveEdit(noteId) {
    const card = document.querySelector(`[data-note-id="${noteId}"]`);
    const ta = card.querySelector('.note-edit-area');
    const newContent = ta.value.trim();
    if (!newContent) { showToast('不能为空'); return; }

    const saveBtn = card.querySelector('.note-edit-save');
    saveBtn.textContent = '…';
    saveBtn.disabled = true;

    try {
      const { error } = await sb
        .from('notes')
        .update({ content: newContent })
        .eq('id', noteId);
      if (error) throw error;

      // update local data
      const note = allNotes.find(n => n.id === noteId);
      if (note) note.content = newContent;

      showToast('已修改');
      renderNotes();
    } catch (e) {
      showToast('修改失败：' + e.message);
      saveBtn.textContent = '改好了';
      saveBtn.disabled = false;
    }
  }

  // ---- TABS ----
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      filterAuthor = t.dataset.filter;
      renderNotes();
    });
  });

  document.querySelectorAll('.sector-tag').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.sector-tag').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      filterSector = t.dataset.sector;
      renderNotes();
    });
  });

  // ---- CALENDAR ----
  let calYear, calMonth;
  const calWrapper = document.getElementById('calendarWrapper');
  const calToggle = document.getElementById('calendarToggle');

  calToggle.addEventListener('click', () => {
    const isOpen = calWrapper.classList.toggle('open');
    calToggle.classList.toggle('open', isOpen);
    if (isOpen && !calYear) {
      const now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();
      renderCalendar();
    }
  });

  document.getElementById('calPrev').addEventListener('click', () => {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  });

  document.getElementById('calNext').addEventListener('click', () => {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  });

  function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const label = document.getElementById('calMonthLabel');

    label.textContent = `${calYear}年${calMonth + 1}月`;

    // build a map: dateStr -> set of authors
    const dateAuthors = {};
    for (const n of allNotes) {
      const d = new Date(n.created_at);
      if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
        const key = d.getDate();
        if (!dateAuthors[key]) dateAuthors[key] = new Set();
        dateAuthors[key].add(n.author);
      }
    }

    const today = new Date();
    const isThisMonth = today.getFullYear() === calYear && today.getMonth() === calMonth;

    // first day of month and total days
    const firstDow = new Date(calYear, calMonth, 1).getDay();
    const totalDays = new Date(calYear, calMonth + 1, 0).getDate();

    const heads = ['日','一','二','三','四','五','六'];
    let html = heads.map(h => `<div class="cal-head">${h}</div>`).join('');

    // empty cells before first day
    for (let i = 0; i < firstDow; i++) {
      html += '<div class="cal-day empty"></div>';
    }

    for (let day = 1; day <= totalDays; day++) {
      const authors = dateAuthors[day];
      const hasNotes = !!authors;
      const hasBoth = hasNotes && authors.size > 1;
      const isToday = isThisMonth && day === today.getDate();

      let cls = 'cal-day';
      if (!hasNotes) cls += '';
      else if (hasBoth) cls += ' has-notes has-both';
      else cls += ' has-notes';
      if (isToday) cls += ' today';

      const dayPad = day.toString().padStart(2, '0');
      const monthPad = (calMonth + 1).toString().padStart(2, '0');
      const dateId = `date-${calYear}-${monthPad}-${dayPad}`;

      if (hasNotes) {
        html += `<div class="${cls}" onclick="jumpToDate('${dateId}')">${day}</div>`;
      } else {
        html += `<div class="${cls}">${day}</div>`;
      }
    }

    grid.innerHTML = html;
  }

  function jumpToDate(dateId) {
    const el = document.getElementById(dateId);
    if (el) {
      // close calendar
      calWrapper.classList.remove('open');
      calToggle.classList.remove('open');
      // scroll to date
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      showToast('当前筛选下没有这天的笔记');
    }
  }

  // ---- COMPOSE ----
  const fab = document.getElementById('fabBtn');
  const panel = document.getElementById('composePanel');
  const overlay = document.getElementById('overlay');
  const closeBtn = document.getElementById('closeBtn');
  const textarea = document.getElementById('composeText');
  const sendBtn = document.getElementById('sendBtn');
  let composeSector = 'memo';

  function openCompose() {
    overlay.classList.add('open');
    panel.classList.add('open');
    setTimeout(() => textarea.focus(), 300);
  }

  function closeCompose() {
    overlay.classList.remove('open');
    panel.classList.remove('open');
    textarea.value = '';
    sendBtn.disabled = true;
  }

  fab.addEventListener('click', openCompose);
  overlay.addEventListener('click', closeCompose);
  closeBtn.addEventListener('click', closeCompose);

  textarea.addEventListener('input', () => {
    sendBtn.disabled = !textarea.value.trim();
  });

  document.querySelectorAll('.compose-sector-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.compose-sector-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      composeSector = b.dataset.sector;
    });
  });

  sendBtn.addEventListener('click', async () => {
    const content = textarea.value.trim();
    if (!content) return;
    sendBtn.disabled = true;
    sendBtn.textContent = '…';
    try {
      const { error } = await sb
        .from('notes')
        .insert({
          author: currentAuthor,
          sector: composeSector,
          content,
          user_id: currentUser.id,
        });
      if (error) throw error;
      closeCompose();
      showToast('已落笔');
      await loadNotes();
    } catch (e) {
      showToast('发送失败：' + e.message);
      sendBtn.disabled = false;
    }
    sendBtn.textContent = '落笔';
  });

  // ---- TOAST ----
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ---- INIT ----
  checkSession();
</script>
</body>
</html>
